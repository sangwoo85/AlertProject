<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kakao Style SSE Demo</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
<main class="page">
    <header class="hero">
        <h2>SSE 데모 (SharedWorker: 탭별 SSE 연결 관리)</h2>
        <p class="hero-note">
            같은 브라우저에서 여러 탭을 열면 탭별로 SSE 연결을 관리하며, 수신 메시지는 해당 탭에만 전달됩니다.
            발신은 POST API로 테스트할 수 있습니다.
        </p>
    </header>

    <div class="box">
        <h3>1) SSE 연결/구독</h3>
        <div class="row">
            <label>clientId</label>
            <input id="clientId" value="client-1" />
            <label>topic</label>
            <input id="topic" value="roomA" />
            <button id="btnConnect">구독 추가(워커에 요청)</button>
            <button id="btnDisconnectAll" class="btn-danger">워커 SSE 종료</button>
        </div>
        <div class="row">
            <div>현재 구독 요청(topic):</div>
            <div id="subs"></div>
        </div>
        <div class="muted">
            * 각 탭은 요청한 topic으로 별도 SSE 연결을 생성합니다.
        </div>
    </div>

    <div class="box">
        <h3>2) 발신(POST)</h3>
        <div class="row">
            <label>from</label>
            <input id="from" value="상우님" />
            <label>sendTopic</label>
            <input id="sendTopic" value="roomA" />
        </div>
        <div class="row">
            <label>message</label>
            <input id="message" class="input-message" value="안녕하세요 SSE!" />
            <button id="btnSend">발신 (/api/send)</button>
            <button id="btnBroadcast" class="btn-secondary">브로드캐스트 (/api/broadcast)</button>
        </div>
        <div class="row">
            <label>interval(ms)</label>
            <input id="timer" value="1000" />
            <button id="btnBroadcastTimer" class="btn-secondary">interval 전송 (/api/broadcast/timer)</button>
        </div>
    </div>

    <div class="box">
        <h3>3) 수신 로그</h3>
        <div class="row">
            <button id="btnClear" class="btn-secondary">로그 지우기</button>
        </div>
        <div id="log"></div>
    </div>
</main>

<script>
    // =========================
    // 유틸
    // =========================
    const logEl = document.getElementById('log');
    const subsEl = document.getElementById('subs');

    function log(line, isError = false) {
        const now = new Date().toLocaleTimeString();
        const prefix = isError ? "[ERR]" : "";
        logEl.textContent += `[${now}]${prefix} ${line}\n`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // =========================
    // SharedWorker 연결
    // =========================
    let worker;
    let subscribedTopics = new Set();

    /**
     * SharedWorker를 초기화하고 워커 -> UI 메시지 수신 핸들러를 연결한다.
     *
     * 동작:
     * 1) SharedWorker 인스턴스를 생성하고 포트를 시작한다.
     * 2) 워커가 전달한 메시지 타입(message/error/unknown)에 따라 로그를 출력한다.
     * 3) 브라우저가 SharedWorker를 지원하지 않거나 로드에 실패하면 에러 로그를 남긴다.
     */
    function initWorker() {
        try {
            worker = new SharedWorker("sse-shared-worker.js");
            worker.port.start();

            // 워커에서 전달되는 이벤트를 UI 로그 포맷으로 변환해 출력
            worker.port.onmessage = (event) => {
                const msg = event.data;
                // msg: {type, ...}
                if (!msg || !msg.type) return;

                switch (msg.type) {
                    case "message":
                        // { type:"message", topic, eventName, data }
                        log(`[recv][${msg.topic || "-"}][${msg.eventName || "message"}] ${msg.data}`);
                        break;

                    case "error":
                        log(`[worker][error] ${msg.data}`, true);
                        break;

                    default:
                        log(`[worker][unknown] ${JSON.stringify(msg)}`);
                }
            };

            log("SharedWorker 연결 완료");
        } catch (e) {
            log("SharedWorker를 지원하지 않는 브라우저이거나 로드 실패: " + e.message, true);
        }
    }

    function renderTopics() {
        subsEl.innerHTML = '';
        [...subscribedTopics].forEach(topic => {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.innerHTML = `<strong>${topic}</strong>`;
            subsEl.appendChild(tag);
        });
    }

    // =========================
    // 워커에 구독 추가/삭제 요청
    // =========================
    function addTopic() {
        const clientId = document.getElementById("clientId").value.trim();
        const topic = document.getElementById("topic").value.trim();

        if (!worker) return log("워커가 초기화되지 않았습니다.", true);
        if (!clientId || !topic) return log("clientId/topic을 입력하세요.", true);

        // UI 상태 업데이트
        subscribedTopics.add(topic);
        renderTopics();

        // 워커에 "topic 추가" 요청
        worker.port.postMessage({
            type: "connect",
            clientId,
            topic
        });

        log(`워커에 구독 요청: topic=${topic}`);
    }

    function disconnectAll() {
        if (!worker) return log("워커가 초기화되지 않았습니다.", true);

        subscribedTopics.clear();
        renderTopics();

        worker.port.postMessage({ type: "disconnectAll" });
        log("워커 SSE 전체 종료 요청");
    }

    // =========================
    // 발신 API
    // =========================
    async function send() {
        const from = document.getElementById('from').value.trim();
        const topic = document.getElementById('sendTopic').value.trim();
        const message = document.getElementById('message').value.trim();

        if (!topic || !message) return log("sendTopic/message를 입력하세요.", true);

        const res = await fetch('/api/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ topic, message, from })
        });

        log(`발신 결과: HTTP ${res.status}`);
    }

    async function broadcast() {
        const message = document.getElementById('message').value.trim();
        if (!message) return log("message를 입력하세요.", true);

        const res = await fetch(`/api/broadcast?message=${encodeURIComponent(message)}`, {
            method: 'POST'
        });

        log(`브로드캐스트 결과: HTTP ${res.status}`);
    }

    async function broadcastTimer() {
        const timer = document.getElementById('timer').value.trim();
        if (!timer || Number.isNaN(Number(timer))) {
            return log("interval(ms)에 숫자를 입력하세요.", true);
        }

        const res = await fetch(`/api/broadcast/timer?timer=${encodeURIComponent(timer)}`, {
            method: 'POST'
        });

        log(`interval 브로드캐스트 결과: HTTP ${res.status}`);
    }

    // =========================
    // 이벤트 바인딩
    // =========================
    document.getElementById('btnConnect').onclick = addTopic;
    document.getElementById('btnDisconnectAll').onclick = disconnectAll;
    document.getElementById('btnSend').onclick = send;
    document.getElementById('btnBroadcast').onclick = broadcast;
    document.getElementById('btnBroadcastTimer').onclick = broadcastTimer;
    document.getElementById('btnClear').onclick = () => (logEl.textContent = '');

    // =========================
    // 초기화
    // =========================
    initWorker();
    renderTopics();
</script>
</body>
</html>
